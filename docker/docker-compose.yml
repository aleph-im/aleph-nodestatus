services:
  # Hourly extraction: broadcasts process() on the AlephPaymentProcessor to
  # sweep USDC/ETH/ALEPH balances into the distribution wallet. Uses the
  # payment processor admin pkey (falls back to ethereum_pkey with a
  # WARNING). Idempotent — tokens with zero balance are skipped.
  nodestatus-extract:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    stdin_open: true
    tty: true
    volumes:
      - ../:/aleph-nodestatus
      # The service config lives in a per-service env file mounted as the
      # project-root `.env`, which pydantic-settings (env_file=".env") loads
      # after the cron job `cd`s into /aleph-nodestatus. This avoids relying on
      # Docker `env_file`, whose vars land in the OS environment that cron
      # strips from job execution. Must exist on the host or Docker creates an
      # empty directory here instead.
      - ./.env.extract:/aleph-nodestatus/.env:ro
    # Maps `host.docker.internal` to the host's bridge gateway IP so
    # fork-mode dry-runs (`--fork-rpc=http://host.docker.internal:8545`
    # targeting a local Anvil) work on Linux hosts, not just Docker
    # Desktop. No-op for the cron path. Requires Docker ≥ 20.10.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: /bin/bash -c "echo '0 * * * * cd /aleph-nodestatus && /usr/local/bin/nodestatus-extract-credits --act -v >> /proc/1/fd/1 2>&1' | crontab - && service cron start && /bin/sh"

  # Hourly calculation snapshots for the new credit-rewards flow.
  # ethereum_pkey here must be status_sender's.
  # The legacy `nodestatus-distribute` (staking-rewards) calc cron was
  # removed: the credits flow replaces the staking flow entirely under v2
  # tokenomics, so the two are mutually exclusive.
  nodestatus-calc:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    stdin_open: true
    tty: true
    volumes:
      - ../:/aleph-nodestatus
      # See note on nodestatus-extract: per-service config mounted as the
      # project-root .env that pydantic loads.
      - ./.env.calc:/aleph-nodestatus/.env:ro
    # See note on nodestatus-extract — kept on all three services for
    # consistency so operators don't have to remember which one needs it.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: /bin/bash -c "echo '0 * * * * cd /aleph-nodestatus && /usr/local/bin/nodestatus-distribute-credits -v >> /proc/1/fd/1 2>&1' | crontab - && service cron start && /bin/sh"

  # Distribution every 10 days. ethereum_pkey here must be
  # distribution_recipient's and the address must hold >= the expected
  # per-period ALEPH outflow. The app's own cadence guard
  # (credit_dist_min_interval_blocks, default ~10 days) is an additional
  # safety net: even if cron mis-fires, a run too close to the previous
  # one is logged and skipped.
  nodestatus-dist:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    stdin_open: true
    tty: true
    volumes:
      - ../:/aleph-nodestatus
      # See note on nodestatus-extract: per-service config mounted as the
      # project-root .env that pydantic loads.
      - ./.env.dist:/aleph-nodestatus/.env:ro
    # See note on nodestatus-extract.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: /bin/bash -c "echo '0 0 */10 * * cd /aleph-nodestatus && /usr/local/bin/nodestatus-distribute-credits --act -v >> /proc/1/fd/1 2>&1' | crontab - && service cron start && /bin/sh"
